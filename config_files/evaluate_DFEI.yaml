settings:
  model_arch: "DFEI" # architecture of the model to evaluate
  model: 6 # Only version number, auto select the bis model
  model_name: "None" # "best-epoch" path, "None" for auto select bis
  data_dir: "/eos/user/y/yukaiz/DFEI_IFT_Run3/test_data/MC_normed/"
  ncpu: 16  # NCPUs for data loader, full dataset limited to 8 for workers due to cpu mem constraints
  calibration: false

inference:
  edge_prune_thr: 0.1  # Edge prune threshold during reco
  node_prune_thr: 0.1  # Node prune threshold during reco
  optimize_thr: false
  # allows enabling disabling certain plot features
  plt_nodes: true
  plt_edges: true
  plt_pvs: true

evaluate:
  sample: [ "BsToDsPi_00338392" ]
  nfiles: [ 10 ]
  over_write: "" # argument to overwrite the output names to rerun safely the same sample: "" for no overwrite

