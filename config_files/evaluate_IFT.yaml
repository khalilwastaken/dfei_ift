settings:
  model_arch: "IFT" # architecture of the model to evaluate
  model: 0 # version number or full path
  # dfei model for IFT, always specify for logging with clear information
  dfei_model: "None" # DFEI model which is used within IFT: "None", "DFEI_version_number"
  data_dir: "/eos/user/y/yukaiz/DFEI_IFT/cached_data/DFEI_LHCb_data_normed_pt_data"
  ncpu: 8  # NCPUs for data loader, full dataset limited to 8 for workers due to cpu mem constraints

inference:
  edge_prune_thr: 0.1  # Edge prune threshold during reco
  node_prune_thr: 0.1  # Node prune threshold during reco

evaluate:
  sample: [ "23456700_Bu_JpsiK" ]
  nfiles: [ 10 ]
  over_write: "" # argument to overwrite the output names to rerun safely the same sample: "" for no overwrite
